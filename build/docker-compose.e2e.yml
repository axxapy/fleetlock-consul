services:
  consul:
    image: hashicorp/consul:1.22
    command: agent -dev -client=0.0.0.0
    healthcheck:
      test: consul members
      interval: 2s
      retries: 10

  fleetlock:
    build:
      context: ..
      dockerfile: build/Dockerfile
    environment:
      FLEETLOCK_HTTP_LISTEN: "0.0.0.0:9090"
      FLEETLOCK_CONSUL_ADDRESS: "consul:8500"
    depends_on:
      consul:
        condition: service_healthy
  e2e:
    image: alpine/curl
    entrypoint: ["/bin/sh", "/e2e.sh"]
    volumes:
      - ./e2e.sh:/e2e.sh:ro
    environment:
      BASE_URL: "http://fleetlock:9090"
    depends_on:
      - fleetlock
